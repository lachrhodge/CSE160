<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 2: Blocky Animal</title>
  </head>

  <body onload="main()">

    <p id="metrics">--</p>

    <canvas id="webgl" width="400" height="400"></canvas>

    <br>
    <label for="CamReset">Control the camera by drag clicking. Pitch locked by default.</label>
    <br>
    <button id="CamReset" type="button">Reset Camera</button>
    <button id="CamLeft" type="button">Left View</button>
    <button id="CamRight" type="button">Right View</button>
    <button id="lockY" type="button">Pitch Lock</button>

    <br><br>
    <label for="anim_select">Animations:</label>
    <div name="anim_select">
      <button id="On" type="button">On</button>
      <button id="Off" type="button">Off</button>
    </div>
    <p>Shift click the canvas for an alternate animation!</p>

    <label for="Camera">Camera Rotation: </label>
    <input id="rotSlider" name="Camera" type="range" min="0" max="360" class="slider" value="180"></range>
    <br>
    <label for="tail">Tail Angle: </label>
    <input id="tail" name="angBase" type="range" min="0" max="75" class="slider" value="0"></range>
    <br>
    <label for="Base">Neck Back and Forth: </label>
    <input id="Base" name="Base" type="range" min="0" max="75" class="slider" value="40"></range>
    <br><label for="tail">Neck Side to Side: </label>
    <input id="sts" name="angBase" type="range" min="-30" max="30" class="slider" value="0"></range>
    <br><label for="tail">Head Swivel: </label>
    <input id="headswiv" name="angBase" type="range" min="-30" max="30" class="slider" value="0"></range>


    <script src="asgn2.js"></script>
    <script src="Volumes.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
  </body>
</html>
