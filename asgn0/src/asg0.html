<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 0 for CSE 160</title>
  </head>

  <body onload="main()", align="center">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="asg0.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    
    <br>
    <label for="name">v1 x:</label>
    <input type="number" id="v1x" name="v1x" />
    <label for="name"> y:</label>
    <input type="number" id="v1y" name="v1y" />
    
    <br>
    <label for="name">v2 x:</label>
    <input type="number" id="v2x" name="v2x" />
    <label for="name"> y:</label>
    <input type="number" id="v2y" name="v2y" />
    
    <br>  
    <input type="button" value="Draw" onclick="handleDrawEvent()" />
  
    <br><br>
    <label for="oper"> Operation: </label>
    <select name="oper" id="oper">
      <option value="add">add</option>
      <option value="sub">subtract</option>
      <option value="mul">multiply</option>
      <option value="div">divide</option>
      <option value="ang">angle between</option>
      <option value="ara">area</option>
      <option value="mag">magnitude</option>
      <option value="nor">normalize</option>
    </select>

    <label for="scalar">Scalar: </label>
    <input name="scalar" id="scalar" type="number">
    <br>  
    <input type="button" value="Draw" onclick="handleDrawOperationEvent()" />

  </body>
</html>
